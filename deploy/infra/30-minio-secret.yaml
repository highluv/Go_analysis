# ============================================================================
#  Секрет с root-доступом к MinIO (S3-совместимое хранилище raw-манифестов).
#  Те же оговорки про base64/git, что и для Postgres.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: acg-system
type: Opaque
stringData:
  MINIO_ROOT_USER: acg-minio
  MINIO_ROOT_PASSWORD: acg-minio-dev-password   # <-- так делать не нада
