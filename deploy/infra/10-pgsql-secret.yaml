# ============================================================================
#  Секрет с учётными данными Postgres.
#
#  Как читать: Secret — это просто пары ключ/значение, которые потом
#  пробрасываются в под через env или volume. Здесь используем stringData
#  (открытый текст в манифесте; Kubernetes сам закодирует в base64).
#
#  ВАЖНО про безопасность: base64 — это НЕ шифрование. В реальном проекте
#  пароль не коммитят в git. Альтернативы:
#   - kustomize secretGenerator (генерит Secret из .env, .env в .gitignore);
#   - External Secrets Operator / Sealed Secrets / SOPS (шифрование в git);
#   - Vault.
#  Для курсовой с эфемерными данными хардкод допустим, но это ТЕХДОЛГ —
#  пометьте его как таковой.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: acg-system
type: Opaque
stringData:
  POSTGRES_USER: acg
  POSTGRES_PASSWORD: acg-dev-password   # <-- так если чё делать не нада
  POSTGRES_DB: acg
