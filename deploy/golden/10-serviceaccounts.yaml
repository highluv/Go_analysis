# ============================================================================
#  ServiceAccount'ы — источник IDENTITY для Istio.
#
#  Каждый SA превращается в SPIFFE-identity вида
#    spiffe://cluster.local/ns/<namespace>/sa/<serviceaccount>
#  именно это значение фигурирует в principals у AuthorizationPolicy.
#
#  если у workload в pod-шаблоне НЕ указан
#  serviceAccountName, под работает под SA "default" своего namespace.
#  Поэтому SA задаём явно и в Deployment'ах ссылаемся на них явно — чтобы
#  «раскрытие identity» было однозначным.
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: shop
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders-sa
  namespace: shop
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-sa
  namespace: shop
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-sa
  namespace: external
---

apiVersion: v1
kind: ServiceAccount
