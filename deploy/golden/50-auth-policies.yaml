# ============================================================================
#  AuthorizationPolicy — слой авторизации. ЗДЕСЬ И РОЖДАЮТСЯ ОГРАНИЧЕНИЯ,
#  то есть собственно рёбра ACG.
#
#  Как читать политику (поля, на которые смотрит анализатор):
#   - spec.selector.matchLabels — к каким workload'ам ПРИМЕНЯЕТСЯ политика
#     (это DESTINATION). Нет selector => вся namespace.
#   - action: ALLOW | DENY | CUSTOM. У нас только ALLOW.
#   - rules[].from[].source.principals / namespaces — кому РАЗРЕШЕНО (SOURCE).
#
#  Семантика И/ИЛИ:
#   - несколько principals в ОДНОМ списке  => ИЛИ (любой из них подходит);
#   - разные поля внутри одного source (principals И namespaces) => И;
#   - несколько записей from[] => ИЛИ;
#   - несколько rules / несколько политик => ИЛИ.
#
#  DEFAULT-DENY:
#   как только к workload применён ХОТЯ БЫ ОДИН ALLOW — разрешено только
#   то, что попало в ALLOW; всё остальное запрещено. Если ALLOW-политик у
#   workload НЕТ вовсе — разрешено всё. Поэтому у frontend НИЖЕ намеренно
#   НЕТ политики: это проверка ветки default-allow.
# ============================================================================

# --- payments: разрешаем ТОЛЬКО orders ---------------------------------------
# Ожидаемые следствия оракула:
#   orders   -> payments  = РАЗРЕШЕНО (principal совпал)
#   frontend -> payments  = ЗАПРЕЩЕНО (есть ALLOW, но principal не совпал
#                                       => default-deny)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: payments-allow-orders
  namespace: shop
spec:
  selector:
    matchLabels:
      app: payments          # destination = workload payments
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/shop/sa/orders-sa
---
# --- orders: разрешаем frontend (тот же ns) И analytics (кросс-ns) ------------
# Два principal в ОДНОМ списке => ИЛИ: подходит любой из двух.
# Ожидаемые следствия оракула:
#   frontend             -> orders = РАЗРЕШЕНО
#   analytics (external) -> orders = РАЗРЕШЕНО (кросс-namespace principal)
#   payments             -> orders = ЗАПРЕЩЕНО (не в списке => default-deny)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: orders-allow-frontend-analytics
  namespace: shop
spec:
  selector:
    matchLabels:
      app: orders
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/shop/sa/frontend-sa
              - cluster.local/ns/external/sa/analytics-sa

# --- frontend: ПОЛИТИКИ НЕТ намеренно ----------------------------------------
# Отсутствие ALLOW => к frontend разрешено всё (любой -> frontend = РАЗРЕШЕНО).
# Это и есть проверяемая ветка default-allow. Не добавлять сюда политику.
---
# ============================================================================
#  namespace: monitoring
# ============================================================================

# --- grafana: разрешаем ТОЛЬКО prometheus (тот же ns) -----------------------
# Ожидаемые следствия оракула:
#   prometheus (monitoring) -> grafana = РАЗРЕШЕНО
#   любой другой            -> grafana = ЗАПРЕЩЕНО (default-deny)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: grafana-allow-prometheus
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: grafana
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/monitoring/sa/prometheus-sa

# --- prometheus: ПОЛИТИКИ НЕТ -----------------------------------------------
# prometheus — скрейпер; он сам ходит к endpoints, к нему никто не обращается.
# default-allow: любой -> prometheus = РАЗРЕШЕНО.
---
# ============================================================================
#  namespace: infra
# ============================================================================

# --- cache: разрешаем ТОЛЬКО gateway (тот же ns) ----------------------------
# Ожидаемые следствия оракула:
#   gateway (infra) -> cache = РАЗРЕШЕНО
#   любой другой    -> cache = ЗАПРЕЩЕНО (default-deny)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: cache-allow-gateway
  namespace: infra
spec:
  selector:
    matchLabels:
      app: cache
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/infra/sa/gateway-sa

# --- gateway: ПОЛИТИКИ НЕТ --------------------------------------------------
# gateway — публичная точка входа; default-allow.
---
# ============================================================================
#  namespace: data
# ============================================================================

# --- processor: разрешаем ТОЛЬКО gateway из infra (кросс-ns) ----------------
# Ожидаемые следствия оракула:
#   infra/gateway -> data/processor = РАЗРЕШЕНО  (кросс-ns principal)
#   всё остальное -> data/processor = ЗАПРЕЩЕНО  (default-deny)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: processor-allow-gateway
  namespace: data
spec:
  selector:
    matchLabels:
      app: processor
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/infra/sa/gateway-sa
---
# --- warehouse: разрешаем processor (тот же ns) И analytics (кросс-ns) ------
# Два principal в одном списке => ИЛИ.
# Ожидаемые следствия оракула:
#   data/processor       -> data/warehouse     = РАЗРЕШЕНО
#   external/analytics   -> data/warehouse     = РАЗРЕШЕНО  (кросс-ns)
#   infra/gateway        -> data/warehouse     = ЗАПРЕЩЕНО  (не в списке)
#   shop/orders          -> data/warehouse     = ЗАПРЕЩЕНО  (не в списке)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: warehouse-allow-processor-analytics
  namespace: data
spec:
  selector:
    matchLabels:
      app: warehouse
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/data/sa/processor-sa
              - cluster.local/ns/external/sa/analytics-sa
